services:
  palworld:
    image: thijsvanloef/palworld-server-docker:latest
    restart: unless-stopped
    stop_grace_period: 30s
    env_file:
      - ./config/server.env
      - ./config/palworld.env
      - ./config/integrations.env
      - ./config/mods.env
    ports:
      - "8211:8211/udp"
      - "27015:27015/udp"
    volumes:
      - ./palworld:/palworld/
    healthcheck:
      # gitleaks:allow -- ADMIN_PASSWORD is an environment-variable reference,
      # not an embedded value. The literal is narrowly allowlisted in .gitleaks.toml.
      test:
        - CMD-SHELL
        - >-
          curl --fail --silent --show-error
          --user "admin:$${ADMIN_PASSWORD}"
          "http://127.0.0.1:$${REST_API_PORT}/v1/api/info"
          | jq -e '.version | strings | length > 0' >/dev/null
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 5m

  collector:
    image: palmap/pal-map-collector:local
    build:
      context: .
      dockerfile: Palmap.Collector/Dockerfile
    restart: unless-stopped
    stop_grace_period: 30s
    env_file:
      - ./config/collector.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      palworld:
        condition: service_healthy
    # No ports: the collector is outbound-only. Its container health check reads
    # a process heartbeat written inside the container.
