name: CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
      - "protocol-v*.*.*"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: true

jobs:
  verify:
    name: .NET build and test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Set up .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore Palmap.slnx

      - name: Verify formatting
        run: dotnet format Palmap.slnx --verify-no-changes --no-restore

      - name: Build
        run: dotnet build Palmap.slnx --configuration Release --no-restore --warnaserror

      - name: Test
        run: >-
          dotnet test Palmap.slnx
          --configuration Release
          --no-build
          --no-restore
          --logger "trx;LogFilePrefix=tests"
          --results-directory TestResults/ci

      - name: Upload test results
        if: ${{ always() }}
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: test-results
          path: TestResults/ci/**/*.trx
          if-no-files-found: ignore
          retention-days: 7

  protocol:
    name: Protocol package / publish
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Set up .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: 10.0.x

      - name: Detect protocol project
        id: protocol
        shell: pwsh
        run: |
          $exists = Test-Path -LiteralPath "Palmap.Protocol/Palmap.Protocol.csproj"
          "exists=$($exists.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          if (-not $exists) {
            Write-Host "Palmap.Protocol is not present yet; package work is intentionally skipped."
          }

      - name: Select package version
        if: ${{ steps.protocol.outputs.exists == 'true' }}
        id: package-version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like "refs/tags/protocol-v*") {
            if ($env:GITHUB_REF_NAME -notmatch '^protocol-v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z]+([.-][0-9A-Za-z]+)*)?$') {
              throw "Protocol release tag '$env:GITHUB_REF_NAME' is not supported."
            }

            $version = $env:GITHUB_REF_NAME.Substring("protocol-v".Length)
          }
          else {
            $version = "0.0.0-ci.$env:GITHUB_RUN_NUMBER.$env:GITHUB_RUN_ATTEMPT"
          }

          "value=$version" >> $env:GITHUB_OUTPUT

      - name: Pack protocol
        if: ${{ steps.protocol.outputs.exists == 'true' }}
        shell: pwsh
        run: >-
          dotnet pack Palmap.Protocol/Palmap.Protocol.csproj
          --configuration Release
          --output artifacts/protocol
          --property:ContinuousIntegrationBuild=true
          --property:PackageVersion=${{ steps.package-version.outputs.value }}
          --property:TreatWarningsAsErrors=true

      - name: Validate protocol package contents
        if: ${{ steps.protocol.outputs.exists == 'true' }}
        shell: pwsh
        run: ./scripts/Test-ProtocolPackage.ps1 -PackageDirectory artifacts/protocol

      - name: Upload protocol package
        if: ${{ steps.protocol.outputs.exists == 'true' }}
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: palmap-protocol-${{ steps.package-version.outputs.value }}
          path: artifacts/protocol/*.nupkg
          if-no-files-found: error
          retention-days: 7

      - name: Require NuGet.org API key for a protocol release
        if: ${{ steps.protocol.outputs.exists == 'true' && startsWith(github.ref, 'refs/tags/protocol-v') }}
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:NUGET_API_KEY)) {
            throw "NUGET_API_KEY is required to publish Palmap.Protocol from a protocol release tag."
          }

      - name: Publish protocol to NuGet.org
        if: ${{ steps.protocol.outputs.exists == 'true' && startsWith(github.ref, 'refs/tags/protocol-v') }}
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: >-
          dotnet nuget push "artifacts/protocol/*.nupkg"
          --source https://api.nuget.org/v3/index.json
          --api-key $env:NUGET_API_KEY
          --skip-duplicate

  container:
    name: Container build / publish
    needs:
      - verify
      - protocol
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    env:
      PUSH_IMAGE: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Set image name
        shell: bash
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Validate collector release tag
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        shell: bash
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z]+([.-][0-9A-Za-z]+)*)?$ ]]; then
            echo "Unsupported collector release tag: $GITHUB_REF_NAME" >&2
            exit 1
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
        with:
          platforms: amd64,arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Build linux/amd64 verification image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: Palmap.Collector/Dockerfile
          platforms: linux/amd64
          load: true
          push: false
          tags: palmap-collector-smoke:amd64
          cache-from: type=gha,scope=palmap-collector-amd64
          cache-to: type=gha,mode=max,scope=palmap-collector-amd64
          provenance: false
          sbom: false

      - name: Smoke-test linux/amd64 liveness
        shell: pwsh
        run: >-
          ./scripts/Test-ContainerLiveness.ps1
          -Image palmap-collector-smoke:amd64
          -Platform linux/amd64

      - name: Build linux/arm64 verification image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: Palmap.Collector/Dockerfile
          platforms: linux/arm64
          load: true
          push: false
          tags: palmap-collector-smoke:arm64
          cache-from: type=gha,scope=palmap-collector-arm64
          cache-to: type=gha,mode=max,scope=palmap-collector-arm64
          provenance: false
          sbom: false

      - name: Smoke-test linux/arm64 liveness through QEMU
        shell: pwsh
        run: >-
          ./scripts/Test-ContainerLiveness.ps1
          -Image palmap-collector-smoke:arm64
          -Platform linux/arm64

      - name: Log in to GitHub Container Registry
        if: ${{ env.PUSH_IMAGE == 'true' }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate published image metadata
        if: ${{ env.PUSH_IMAGE == 'true' }}
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ env.IMAGE_NAME }}
          flavor: latest=false
          tags: |
            type=sha,format=long,prefix=sha-,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}},value=${{ github.ref_name }},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-') }}
          labels: |
            org.opencontainers.image.title=Palmap Collector
            org.opencontainers.image.description=Palworld server data collector

      - name: Publish multi-architecture image
        if: ${{ env.PUSH_IMAGE == 'true' }}
        id: publish
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: Palmap.Collector/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=palmap-collector-amd64
            type=gha,scope=palmap-collector-arm64
          cache-to: type=gha,mode=max,scope=palmap-collector-publish
          provenance: mode=max
          sbom: true

      - name: Attest published image
        if: ${{ env.PUSH_IMAGE == 'true' }}
        uses: actions/attest@36051bcae73b7c2a8a6945a48cbf80953c6baa35 # v4
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.publish.outputs.digest }}
          push-to-registry: true
