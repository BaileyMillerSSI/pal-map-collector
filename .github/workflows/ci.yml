name: CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: true

jobs:
  verify:
    name: .NET build and test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Set up .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore Palmap.slnx

      - name: Verify formatting
        run: dotnet format Palmap.slnx --verify-no-changes --no-restore

      - name: Build
        run: dotnet build Palmap.slnx --configuration Release --no-restore --warnaserror

      - name: Test
        run: >-
          dotnet test Palmap.slnx
          --configuration Release
          --no-build
          --no-restore
          --logger "trx;LogFilePrefix=tests"
          --results-directory TestResults/ci

      - name: Pack public protocol
        run: >-
          dotnet pack Palmap.Protocol/Palmap.Protocol.csproj
          --configuration Release
          --no-build
          --no-restore
          --output artifacts/packages

      - name: Verify package contents
        shell: pwsh
        run: |
          $package = Get-ChildItem artifacts/packages/Palmap.Protocol.1.0.0-rc.1.nupkg
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $archive = [IO.Compression.ZipFile]::OpenRead($package.FullName)
          try {
            $names = $archive.Entries.FullName
            if ('contentFiles/any/any/schema/palmap-snapshot-v1.schema.json' -notin $names) { throw 'Protocol schema missing from package.' }
            if ('contentFiles/any/any/fixtures/snapshot-v1.synthetic.json' -notin $names) { throw 'Protocol fixture missing from package.' }
          } finally { $archive.Dispose() }

      - name: Upload protocol package
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: protocol-package
          path: artifacts/packages/*.nupkg
          if-no-files-found: error
          retention-days: 7

      - name: Upload test results
        if: ${{ always() }}
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: test-results
          path: TestResults/ci/**/*.trx
          if-no-files-found: ignore
          retention-days: 7

  container:
    name: Container build / publish
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    env:
      PUSH_IMAGE: ${{ github.event.repository.visibility == 'public' && github.event_name == 'push' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Set image name
        shell: bash
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GitHub Container Registry
        if: ${{ env.PUSH_IMAGE == 'true' }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ env.IMAGE_NAME }}
          flavor: latest=false
          tags: |
            type=ref,event=pr
            type=sha,format=long,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-') }}
          labels: |
            org.opencontainers.image.title=Palmap Collector
            org.opencontainers.image.description=Palworld server data collector

      - name: Build and optionally publish image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: Palmap.Collector/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ env.PUSH_IMAGE == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=palmap-collector
          cache-to: type=gha,mode=max,scope=palmap-collector
          provenance: ${{ env.PUSH_IMAGE == 'true' }}
          sbom: ${{ env.PUSH_IMAGE == 'true' }}

      - name: Attest published image
        if: ${{ env.PUSH_IMAGE == 'true' && github.event.repository.visibility == 'public' }}
        uses: actions/attest@36051bcae73b7c2a8a6945a48cbf80953c6baa35 # v4
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
